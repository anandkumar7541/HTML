<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        * {
            background-color: rgb(66, 66, 66);
        }

        h1 {
            color: white;
        }

        h2 {
            color: tomato;
        }

        ul {
            color: yellowgreen;
        }
    </style>
</head>

<body>
    <h1>List</h1>
    <h2>Type of tea</h2>
    <ol>
        <li>Lemon tea</li>
        <li>Ice tea</li>
        <li>Black tea</li>
        <li>Green tea</li>
        <li>Herbal tea</li>
        <li>Oolong tea</li>
    </ol>
    <h2>City</h2>
    <ul>
        <li>Patna</li>
        <li>Delhi</li>
        <li>Mumbai</li>
        <li>Kolkata</li>
        <li>Bangalore</li>
        <li>Hyderabad</li>
    </ul>
</body>

</html>
