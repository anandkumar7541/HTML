<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criceter Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            padding: 40px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        caption {
            caption-side: top;
            font-size: 24px;
            font-weight: bold;
            color: #444;
            padding: 12px;
        }

        thead {
            background-color: #e0e0e0;
        }

        th,
        td {
            padding: 12px 18px;
            text-align: center;
            border: 1px solid #ccc;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #493b3b;
        }
    </style>
</head>

<body>
    <table>
        <caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Score</th>
                <th>Match</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Virat kohli</td>
                <td>34</td>
                <td>IPL 2025</td>
            </tr>
            <tr>
                <td>Rohit Sharma</td>
                <td>84</td>
                <td>IPL 2025</td>
            </tr>
            <tr>
                <td>Shresh Iyer</td>
                <td>94</td>
                <td>IPL 2025</td>
            </tr>
        </tbody>
        </caption>
    </table>
</body>

</html>
